<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><style>
  body { padding: 22px 24px; gap: 12px; }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
  .ico { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px; background: var(--bg-card); border: 1px solid var(--ink-4); border-radius: var(--radius-md); }
  .ico svg { color: var(--fg-secondary); }
  .ico .n { font-family: var(--font-mono); font-size: 9px; color: var(--fg-muted); }
  .note { font-size: 11px; color: var(--fg-tertiary); }
</style></head><body>
  <div class="label">Iconography — Lucide, 1.5 px stroke, 14 px default</div>
  <div class="grid">
    <div class="ico"><i data-lucide="layout-dashboard" stroke-width="1.5"></i><div class="n">dash</div></div>
    <div class="ico"><i data-lucide="message-square" stroke-width="1.5"></i><div class="n">chat</div></div>
    <div class="ico"><i data-lucide="file-text" stroke-width="1.5"></i><div class="n">docs</div></div>
    <div class="ico"><i data-lucide="search" stroke-width="1.5"></i><div class="n">search</div></div>
    <div class="ico"><i data-lucide="copy" stroke-width="1.5"></i><div class="n">dupes</div></div>
    <div class="ico"><i data-lucide="upload-cloud" stroke-width="1.5"></i><div class="n">upload</div></div>
    <div class="ico"><i data-lucide="settings" stroke-width="1.5"></i><div class="n">settings</div></div>
    <div class="ico"><i data-lucide="folder-plus" stroke-width="1.5"></i><div class="n">scan</div></div>
    <div class="ico"><i data-lucide="sparkles" stroke-width="1.5"></i><div class="n">ai</div></div>
    <div class="ico"><i data-lucide="external-link" stroke-width="1.5"></i><div class="n">open</div></div>
    <div class="ico"><i data-lucide="folder" stroke-width="1.5"></i><div class="n">reveal</div></div>
    <div class="ico"><i data-lucide="refresh-cw" stroke-width="1.5"></i><div class="n">reclass</div></div>
    <div class="ico"><i data-lucide="trash-2" stroke-width="1.5"></i><div class="n">delete</div></div>
    <div class="ico"><i data-lucide="filter" stroke-width="1.5"></i><div class="n">filter</div></div>
    <div class="ico"><i data-lucide="layout-grid" stroke-width="1.5"></i><div class="n">grid</div></div>
    <div class="ico"><i data-lucide="list" stroke-width="1.5"></i><div class="n">list</div></div>
    <div class="ico"><i data-lucide="alert-circle" stroke-width="1.5"></i><div class="n">alert</div></div>
    <div class="ico"><i data-lucide="check-circle" stroke-width="1.5"></i><div class="n">ok</div></div>
    <div class="ico"><i data-lucide="send" stroke-width="1.5"></i><div class="n">send</div></div>
    <div class="ico"><i data-lucide="command" stroke-width="1.5"></i><div class="n">cmd</div></div>
  </div>
  <div class="note">Loaded from CDN: <span class="mono" style="font-family:var(--font-mono)">unpkg.com/lucide</span>. Stroke width 1.5, color: <span class="mono" style="font-family:var(--font-mono)">currentColor</span>.</div>
  <script>lucide.createIcons();</script>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
  body { padding: 22px 24px; gap: 14px; align-items: center; flex-direction: row; justify-content: space-between; }
  .glyph-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .glyph-block img { width: 64px; height: 64px; }
  .glyph-block .name { font-size: 11px; color: var(--fg-tertiary); font-family: var(--font-mono); }
  .lockup img { height: 40px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .pill { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style></head><body>
  <div class="glyph-block">
    <img src="../assets/glyph-docuvault.svg" alt="DocuVault glyph" />
    <div class="name">glyph 64×64</div>
  </div>
  <div class="stack">
    <div class="lockup"><img src="../assets/logo-docuvault.svg" alt="DocuVault wordmark" /></div>
    <div class="pill">wordmark · sidebar lockup · 220×44</div>
  </div>
</body></html>

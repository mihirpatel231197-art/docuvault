<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
  body { padding: 22px 24px; gap: 14px; }
  .scale { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--ink-5); }
  .step { flex: 1; height: 56px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font-family: var(--font-mono); font-size: 9px; color: oklch(0.2 0.005 264); }
  .step.light-fg { color: oklch(0.985 0.002 264); }
  .demo { display: flex; gap: 10px; align-items: center; }
  .btn { padding: 8px 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius-md); border: none; cursor: pointer; font-family: var(--font-sans); }
  .btn-pri { background: var(--accent-500); color: oklch(0.99 0.002 264); box-shadow: var(--shadow-inset-top), 0 1px 0 0 oklch(0.36 0.14 248); }
  .ring { width: 60px; height: 32px; border-radius: var(--radius-md); background: var(--bg-card); border: 1px solid var(--ink-5); box-shadow: var(--shadow-ring-accent); }
  .note { font-size: 11px; color: var(--fg-tertiary); }
</style></head><body>
  <div class="label">Accent — restrained cobalt</div>
  <div class="scale">
    <div class="step light-fg" style="background:var(--accent-50)">50</div>
    <div class="step light-fg" style="background:var(--accent-100)">100</div>
    <div class="step light-fg" style="background:var(--accent-200)">200</div>
    <div class="step light-fg" style="background:var(--accent-300)">300</div>
    <div class="step light-fg" style="background:var(--accent-400)">400</div>
    <div class="step light-fg" style="background:var(--accent-500)">500</div>
    <div class="step light-fg" style="background:var(--accent-600)">600</div>
    <div class="step light-fg" style="background:var(--accent-700)">700</div>
    <div class="step light-fg" style="background:var(--accent-800)">800</div>
    <div class="step light-fg" style="background:var(--accent-900)">900</div>
  </div>
  <div class="demo">
    <button class="btn btn-pri">Primary action</button>
    <div class="ring"></div>
    <span class="note">Used <em>only</em> for primary buttons, focus rings, active nav, and user chat bubbles.</span>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
  body { padding: 22px 24px; gap: 12px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .ft {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 10px;
    background: var(--bg-card);
    border: 1px solid var(--ink-4);
    border-radius: var(--radius-md);
  }
  .chip {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border-radius: var(--radius-md);
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  }
  .name { font-size: 11px; color: var(--fg-secondary); }
  .token { font-family: var(--font-mono); font-size: 9px; color: var(--fg-muted); }
</style></head><body>
  <div class="label">File-type icons — colored chips</div>
  <div class="grid">
    <div class="ft"><div class="chip" style="background:oklch(0.66 0.20 25 / 0.15);color:var(--ft-pdf)">PDF</div><div class="name">PDF</div></div>
    <div class="ft"><div class="chip" style="background:oklch(0.74 0.16 0 / 0.15);color:var(--ft-image)">IMG</div><div class="name">Image</div></div>
    <div class="ft"><div class="chip" style="background:oklch(0.65 0.16 248 / 0.15);color:var(--ft-word)">DOC</div><div class="name">Word</div></div>
    <div class="ft"><div class="chip" style="background:oklch(0.72 0.16 145 / 0.15);color:var(--ft-excel)">XLS</div><div class="name">Excel</div></div>
    <div class="ft"><div class="chip" style="background:oklch(0.65 0.01 264 / 0.20);color:var(--ft-code)">{ }</div><div class="name">Code</div></div>
    <div class="ft"><div class="chip" style="background:oklch(0.68 0.18 295 / 0.15);color:var(--ft-audio)">WAV</div><div class="name">Audio</div></div>
    <div class="ft"><div class="chip" style="background:oklch(0.74 0.16 50 / 0.15);color:var(--ft-video)">MP4</div><div class="name">Video</div></div>
    <div class="ft"><div class="chip" style="background:oklch(0.60 0.01 264 / 0.20);color:var(--ft-default)">···</div><div class="name">Other</div></div>
  </div>
</body></html>

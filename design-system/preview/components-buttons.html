<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
  body { padding: 22px 24px; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px;
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    border-radius: var(--radius-md);
    border: 1px solid transparent; cursor: pointer;
    transition: all var(--dur-base) var(--ease-out);
  }
  .btn-pri { background: var(--accent-500); color: oklch(0.99 0.002 264); border-color: var(--accent-700); box-shadow: var(--shadow-inset-top); }
  .btn-sec { background: var(--ink-3); color: var(--fg-primary); border-color: var(--ink-5); box-shadow: var(--shadow-inset-top); }
  .btn-ghost { background: transparent; color: var(--fg-secondary); }
  .btn-danger { background: transparent; color: var(--danger); border-color: oklch(0.68 0.20 25 / 0.4); }
  .btn:hover { filter: brightness(1.08); }
  .btn-ghost:hover { background: var(--ink-3); color: var(--fg-primary); }
  .btn-disabled { opacity: 0.45; cursor: not-allowed; }
  .ico { width: 14px; height: 14px; }
  kbd { margin-left: 4px; }
</style></head><body>
  <div class="label">Buttons</div>
  <div class="row">
    <button class="btn btn-pri">Scan folder</button>
    <button class="btn btn-sec">Cancel</button>
    <button class="btn btn-ghost">Reveal in Finder</button>
    <button class="btn btn-danger">Delete</button>
    <button class="btn btn-sec btn-disabled">Disabled</button>
  </div>
  <div class="row">
    <button class="btn btn-pri">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      Send
    </button>
    <button class="btn btn-sec">
      Open <kbd>↵</kbd>
    </button>
    <button class="btn btn-sec">
      Search <kbd>⌘</kbd><kbd>K</kbd>
    </button>
  </div>
</body></html>

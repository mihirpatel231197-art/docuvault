<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
  body { padding: 22px 24px; gap: 12px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .lbl { font-size: 11px; color: var(--fg-tertiary); }
  .input {
    height: 32px; padding: 0 12px;
    font-family: var(--font-sans); font-size: 13px; color: var(--fg-primary);
    background: var(--bg-input); border: 1px solid var(--border-default);
    border-radius: var(--radius-sm);
    outline: none;
  }
  .input.focused {
    border-color: var(--accent-500);
    box-shadow: 0 0 0 3px oklch(0.62 0.19 248 / 0.18);
  }
  .input.mono { font-family: var(--font-mono); font-size: 12px; color: var(--fg-secondary); }
  .input::placeholder { color: var(--fg-muted); }
  .search-input { display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 12px; background: var(--bg-input); border: 1px solid var(--border-default); border-radius: var(--radius-md); }
  .search-input input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--fg-primary); font-size: 13px; font-family: var(--font-sans); }
</style></head><body>
  <div class="label">Inputs</div>
  <div class="stack">
    <div class="field">
      <div class="lbl">Folder path</div>
      <input class="input mono" value="~/Documents/Archive" />
    </div>
    <div class="field">
      <div class="lbl">Title</div>
      <input class="input focused" value="Q3 board memo" />
    </div>
    <div class="search-input">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--fg-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Search across all your documents…" />
      <kbd>⌘K</kbd>
    </div>
  </div>
</body></html>

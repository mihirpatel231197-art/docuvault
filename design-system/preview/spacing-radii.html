<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
  body { padding: 22px 24px; gap: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .demo { width: 64px; height: 56px; background: var(--bg-card); border: 1px solid var(--ink-5); box-shadow: var(--shadow-inset-top); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); }
  .px { font-family: var(--font-mono); font-size: 9px; color: var(--fg-muted); }
</style></head><body>
  <div class="label">Border radii</div>
  <div class="grid">
    <div class="item"><div class="demo" style="border-radius:var(--radius-xs)"></div><div class="name">xs</div><div class="px">3 px · chips</div></div>
    <div class="item"><div class="demo" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="px">5 px · inputs</div></div>
    <div class="item"><div class="demo" style="border-radius:var(--radius-md)"></div><div class="name">md</div><div class="px">7 px · buttons</div></div>
    <div class="item"><div class="demo" style="border-radius:var(--radius-lg)"></div><div class="name">lg</div><div class="px">10 px · cards</div></div>
    <div class="item"><div class="demo" style="border-radius:var(--radius-xl)"></div><div class="name">xl</div><div class="px">14 px · modals</div></div>
  </div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
  body { padding: 26px; gap: 14px; }
  .row-spec { display: flex; align-items: center; gap: 14px; padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--ink-4); border-radius: var(--radius-lg); box-shadow: var(--shadow-inset-top); }
  .ico { width: 32px; height: 32px; display: grid; place-items: center; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .title { font-size: 14px; font-weight: 500; color: var(--fg-primary); }
  .path { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); margin-top: 2px; }
  .meta-row { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--fg-tertiary); }
  .conf { font-family: var(--font-mono); font-size: 11px; font-variant-numeric: tabular-nums; }
  .grow { flex: 1; min-width: 0; }
</style></head><body>
  <div class="row-spec">
    <div class="ico" style="background:oklch(0.66 0.20 25 / 0.15);color:var(--ft-pdf)">PDF</div>
    <div class="grow">
      <div class="title">Lease agreement — 2024 renewal.pdf</div>
      <div class="path">~/Documents/Apartments/lease-2024-renewal.pdf</div>
    </div>
    <div class="conf" style="color:var(--success)">94%</div>
  </div>
  <div class="row-spec">
    <div class="ico" style="background:oklch(0.65 0.16 248 / 0.15);color:var(--ft-word)">DOC</div>
    <div class="grow">
      <div class="title">Q3 board memo</div>
      <div class="path">~/Work/board/Q3-memo-final-v2.docx</div>
    </div>
    <div class="conf" style="color:var(--warning)">68%</div>
  </div>
  <div class="row-spec" style="background:transparent;border:none;padding:8px 12px;box-shadow:none">
    <div class="meta-row mono" style="font-family:var(--font-mono)">b3a1c9f7e2d4 · 12.3 MiB · indexed 2 minutes ago</div>
  </div>
</body></html>

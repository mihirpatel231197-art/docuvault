services:
  backend:
    build: ./backend
    ports:
      - "8200:8200"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://docuvault:docuvault@postgres:5432/docuvault
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=docuvault-master-key
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=docuvault
      - MINIO_SECRET_KEY=docuvault-secret
      - MINIO_BUCKET=documents
      - REDIS_URL=redis://redis:6379/0
      - WATCH_DIR=/watch
    volumes:
      - ./watch:/watch
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.worker worker -l info -c 2
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://docuvault:docuvault@postgres:5432/docuvault
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=docuvault-master-key
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=docuvault
      - MINIO_SECRET_KEY=docuvault-secret
      - MINIO_BUCKET=documents
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./watch:/watch
    depends_on:
      - backend
    restart: unless-stopped

  watcher:
    build: ./backend
    command: python -m app.services.watcher
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://docuvault:docuvault@postgres:5432/docuvault
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=docuvault-master-key
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=docuvault
      - MINIO_SECRET_KEY=docuvault-secret
      - MINIO_BUCKET=documents
      - REDIS_URL=redis://redis:6379/0
      - WATCH_DIR=/watch
    volumes:
      - ./watch:/watch
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=docuvault
      - POSTGRES_PASSWORD=docuvault
      - POSTGRES_DB=docuvault
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuvault"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      - MEILI_MASTER_KEY=docuvault-master-key
      - MEILI_ENV=production
    volumes:
      - msdata:/meili_data
    ports:
      - "7700:7700"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    environment:
      - MINIO_ROOT_USER=docuvault
      - MINIO_ROOT_PASSWORD=docuvault-secret
    volumes:
      - filedata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  msdata:
  filedata:
  redisdata:
